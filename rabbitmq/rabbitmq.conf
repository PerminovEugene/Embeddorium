## Networking
listeners.tcp.default = 5672

## Heartbeat timeout suggested to clients (seconds). The negotiated value is the
## SMALLER of this and the client's request, so this server value is the binding
## ceiling. Default is 60s, which is too tight for local Docker Desktop dev where
## the VM is periodically suspended/throttled (machine sleep, App Nap, host load
## spikes) for longer than 60s — every worker then "misses heartbeats" at once
## and reconnects in a churn cycle. 600s absorbs those brief stalls while still
## reaping genuinely dead clients. Clients request the same value (QueueClient).
heartbeat = 600

## Management plugin
management.tcp.port = 15672

## Load definitions on startup
load_definitions = /etc/rabbitmq/definitions.json

## Logging
log.console = true
log.console.level = info

## Resource limits
vm_memory_high_watermark.relative = 0.7
disk_free_limit.absolute = 1GB
