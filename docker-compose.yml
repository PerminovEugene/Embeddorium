services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Optional: Ollama running inside the compose network, reachable by other
  # services as http://ollama:11434 (set OLLAMA_EMBED_BASE_URL accordingly in
  # .env.docker). Not started by a plain `docker compose up -d` — opt in with
  # `docker compose --profile ollama up -d`, or skip this service entirely and
  # point OLLAMA_EMBED_BASE_URL at an Ollama instance already running on the host
  # (http://host.docker.internal:11434 on Mac/Windows Docker Desktop).
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # One-off migrator. Applies pending SQL migrations and exits. Workers that
  # touch the DB wait for this to complete successfully before starting.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: python -m backend.shared.storage.sql.migrate
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      - postgres

  # x-worker-env: &worker-env
  #   HG_TOKEN: ${HG_TOKEN}
  #   POSTGRES_HOST: postgres
  #   POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  #   POSTGRES_USER: ${POSTGRES_USER}
  #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   POSTGRES_DB: ${POSTGRES_DB}
  #   RABBITMQ_HOST: rabbitmq
  #   RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  #   RABBITMQ_USER: ${RABBITMQ_USER}
  #   RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  #   RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  #   QDRANT_URL: http://qdrant:6333

  worker-crawl-frontier-manager:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.crawl_frontier_manager_actor --queues ingest.crawl.frontier.manage.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      # Per-pipeline-run artefacts (PIPELINE_RUNS_DIR, default /tmp/pipeline_runs)
      # are written *inside* the container. Bind-mount a shared host folder so
      # logs and source files (raw XML, parsed text) land in ./tmp/pipeline_run
      # on the host and survive container restarts.
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # --- ingestion pipeline (one worker per stage) ---

  worker-fetch-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.fetch_source_actor --queues ingest.crawl.source.fetch.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-parse-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.parse_source_actor --queues ingest.crawl.source.parse.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-chunk-document:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.chunk_document_actor --queues ingest.crawl.document.chunk.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-schedule-embeddings:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.schedule_embeddings_actor --queues ingest.crawl.embeddings.schedule.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-schedule-links:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.schedule_discovered_links_actor --queues ingest.crawl.links.schedule.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # --- local-file (XML) ingestion chain (re-joins parse_source) ---

  worker-fetch-file-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.fetch_file_source_actor --queues ingest.crawl.file.fetch.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
      # Local source-files mount: XML dumps read by the file-ingestion chain
      # (this actor reads each .xml file from disk and stores its content into the DB).
      - ./sources:/app/sources
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-filter-documents:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.filter_documents_actor --queues ingest.crawl.file.filter.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-embed-chunks:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        # Lightweight extra (qdrant-client + langchain-ollama) — the container
        # runs the mock or ollama provider, so it needs no torch /
        # sentence-transformers. EMBED_PROVIDER/OLLAMA_EMBED_BASE_URL are set in
        # .env.docker. If EMBED_PROVIDER=ollama and Ollama runs as the `ollama`
        # compose service (profile "ollama"), OLLAMA_EMBED_BASE_URL must be
        # http://ollama:11434 — not localhost — since each container has its
        # own loopback interface. If Ollama runs on the host instead, use
        # http://host.docker.internal:11434 (Mac/Windows Docker Desktop).
        EXTRAS: "embed"
    # --threads 1: the embedding model is a lazily-initialized module singleton;
    # a single thread avoids racing on first init and concurrent model.encode.
    command: dramatiq backend.actors.embed_chunks_actor --queues ingest.embed.chunk.generate.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-outbox-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: python -m backend.outbox.dispatcher
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # Embeddings tester API (backend/server/). Built with the shared Dockerfile.dev
  # so it can import backend (VectorStore / OllamaEmbedClient / config) — it reuses
  # the pipeline's Qdrant + embedding code instead of its own. .env.docker
  # supplies QDRANT_URL and the DB/RabbitMQ vars backend.shared.config requires at
  # import. Ollama host/port come from the request (UI) + OLLAMA_HOST.
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "server"
    working_dir: /app
    # --reload-dir backend: scope the reload watcher to the backend package so
    # it never scans ui/node_modules (which churns during `npm ci`/builds and
    # would otherwise crash the reloader with a FileNotFoundError mid-scan).
    command: uvicorn backend.server.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
      # Local source-files mount: XML dumps read by the file-ingestion chain
      # (pipeline_launch.py::_seed_local enumerates *.xml files from dataset paths here).
      - ./sources:/app/sources
    env_file:
      - .env.docker
    environment:
      - OLLAMA_HOST=host.docker.internal
    depends_on:
      qdrant:
        condition: service_started

  ui:
    image: node:lts-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
    command: >
      sh -c "npm ci &&
            npm run dev -- --host"
    environment:
      - HOST=0.0.0.0
    # stdin_open: true
    # tty: true

volumes:
  qdrant_data:
  postgres_data:
  rabbitmq_data:
  ollama_data:
