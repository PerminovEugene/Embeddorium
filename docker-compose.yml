services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}

  # One-off migrator. Applies pending SQL migrations and exits. Workers that
  # touch the DB wait for this to complete successfully before starting.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: python -m laws_agent.storage.sql.migrate
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - postgres

  # x-worker-env: &worker-env
  #   HG_TOKEN: ${HG_TOKEN}
  #   POSTGRES_HOST: postgres
  #   POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  #   POSTGRES_USER: ${POSTGRES_USER}
  #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   POSTGRES_DB: ${POSTGRES_DB}
  #   RABBITMQ_HOST: rabbitmq
  #   RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  #   RABBITMQ_USER: ${RABBITMQ_USER}
  #   RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  #   RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  #   QDRANT_URL: http://qdrant:6333

  worker-crawl-frontier-manager:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: dramatiq laws_agent.actors.crawl_frontier_manager_actor --queues laws.crawl.frontier.manage.v1
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # --- ingestion pipeline (one worker per stage) ---

  worker-fetch-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    command: dramatiq laws_agent.actors.fetch_source_actor --queues laws.crawl.source.fetch.v1
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-parse-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    command: dramatiq laws_agent.actors.parse_source_actor --queues laws.crawl.source.parse.v1
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-chunk-document:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    command: dramatiq laws_agent.actors.chunk_document_actor --queues laws.crawl.document.chunk.v1
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-schedule-embeddings:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: dramatiq laws_agent.actors.schedule_embeddings_actor --queues laws.crawl.embeddings.schedule.v1
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-schedule-links:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: dramatiq laws_agent.actors.schedule_discovered_links_actor --queues laws.crawl.links.schedule.v1
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-outbox-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: python -m laws_agent.outbox.dispatcher
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # One-off seeder. Not started by `up` (tools profile); run via scripts/seed.sh
  # or: docker compose run --rm seed config.json
  seed:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    profiles: ["tools"]
    entrypoint: ["python", "-m", "laws_agent.runners.add_web_source_job"]
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully

volumes:
  qdrant_data:
  postgres_data:
  rabbitmq_data:
