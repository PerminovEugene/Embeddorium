services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Built (not `image: postgres:16`) to get the pg_textsearch extension used
  # by the BM25 chunk-search index (migration
  # 025_add_chunk_bm25_search.sql) — see infra/postgres/README.md.
  #
  # IMPORTANT — major-version upgrade / volume caveat: this moves Postgres
  # from 16 to 17, and the `postgres_data` volume was initialized under 16.
  # Postgres does NOT support starting a newer major version's server binary
  # against an older major version's on-disk data directory — the container
  # will fail to start against an existing `postgres_data` volume. This is a
  # required *operator* action, not something this change automates: either
  # `pg_dump`/`pg_restore` (or `pg_dumpall`) the old volume's data into a
  # fresh 17 volume, or run `pg_upgrade` between the old and new data
  # directories, before bringing this service up in any environment that has
  # a pre-existing `postgres_data` volume. A brand-new environment (no prior
  # volume) is unaffected and just initializes fresh under 17.
  postgres:
    build:
      context: ./infra/postgres
    # shared_preload_libraries must be set before the server starts — it
    # cannot be applied later via CREATE EXTENSION or ALTER SYSTEM + reload,
    # only via a full server restart with this in place. Overriding
    # `command:` here (rather than adding/mounting a postgresql.conf) is the
    # simplest way to guarantee it's always applied to this service.
    command: postgres -c shared_preload_libraries=pg_textsearch
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-off migrator. Applies pending SQL migrations and exits. Workers that
  # touch the DB wait for this to complete successfully before starting.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: python -m backend.shared.storage.sql.migrate
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_started

  # Shared entry point of both ingestion chains: validates web URLs (origin
  # gate) and local files (exists/readable) via per-source-type strategy
  # plugins, then hands admitted targets to worker-fetch-source.
  worker-validate-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.validate_source_actor --queues ingest.crawl.source.validate.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      # Per-pipeline-run artefacts (PIPELINE_RUNS_DIR, default /tmp/pipeline_runs)
      # are written *inside* the container. Bind-mount a shared host folder so
      # logs and source files (raw XML, parsed text) land in ./tmp/pipeline_run
      # on the host and survive container restarts.
      - ./tmp/pipeline_run:/tmp/pipeline_runs
      # Local source-files mount: the local-file validation strategy checks
      # that each seeded .xml file exists and is readable.
      - ./sources:/app/sources
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # --- ingestion pipeline (one worker per stage) ---

  # Merged fetch stage: web targets are fetched over HTTP(S), local-file
  # targets are read from disk — one strategy plugin per source type.
  worker-fetch-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.fetch_source_actor --queues ingest.crawl.source.fetch.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
      # Local source-files mount: XML dumps read by the local-file fetch
      # strategy (each .xml file's content is read from here).
      - ./sources:/app/sources
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-parse-source:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.parse_source_actor --queues ingest.crawl.source.parse.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-chunk-document:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "web"
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.chunk_document_actor --queues ingest.crawl.document.chunk.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-schedule-embeddings:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.schedule_embeddings_actor --queues ingest.crawl.embeddings.schedule.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-schedule-links:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.schedule_discovered_links_actor --queues ingest.crawl.links.schedule.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # --- local-file (XML) chain extras (re-joins parse_source) ---

  worker-filter-documents:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.filter_documents_actor --queues ingest.crawl.file.filter.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-embed-chunks:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        # Lightweight extra (qdrant-client + langchain-ollama) — the container
        # runs the mock or ollama provider, so it needs no torch /
        # sentence-transformers. EMBED_PROVIDER/OLLAMA_EMBED_BASE_URL are set in
        # .env.docker. If EMBED_PROVIDER=ollama and Ollama runs as the `ollama`
        # compose service (profile "ollama"), OLLAMA_EMBED_BASE_URL must be
        # http://ollama:11434 — not localhost — since each container has its
        # own loopback interface. If Ollama runs on the host instead, use
        # http://host.docker.internal:11434 (Mac/Windows Docker Desktop).
        EXTRAS: "embed"
    # --threads 1: the embedding model is a lazily-initialized module singleton;
    # a single thread avoids racing on first init and concurrent model.encode.
    command: dramatiq backend.actors.embed_chunks_actor --queues ingest.embed.chunk.generate.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-track-pipeline-status:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    # --processes/--threads pinned explicitly (dramatiq otherwise defaults to
    # one process per CPU core x 8 threads each) so the SqlStore pool size in
    # the launcher can be sized against a known, bounded concurrency.
    command: dramatiq backend.actors.track_pipeline_status_actor --queues ingest.pipeline.status.track.v1 --processes 1 --threads 1
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  worker-outbox-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: ""
    command: python -m backend.outbox.dispatcher
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # Embeddings tester API (backend/server/). Built with the shared Dockerfile.dev
  # so it can import backend (VectorStore / OllamaEmbedClient / config) — it reuses
  # the pipeline's Qdrant + embedding code instead of its own. .env.docker
  # supplies QDRANT_URL and the DB/RabbitMQ vars backend.shared.config requires at
  # import. Ollama host/port come from the request (UI) + OLLAMA_HOST.
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "server"
    working_dir: /app
    # --reload-dir backend: scope the reload watcher to the backend package so
    # it never scans ui/node_modules (which churns during `npm ci`/builds and
    # would otherwise crash the reloader with a FileNotFoundError mid-scan).
    command: uvicorn backend.server.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./tmp/pipeline_run:/tmp/pipeline_runs
      # Local source-files mount: XML dumps read by the file-ingestion chain
      # (pipeline_launch.py::_seed_local enumerates *.xml files from dataset paths here).
      - ./sources:/app/sources
    env_file:
      - .env.docker
    environment:
      - OLLAMA_HOST=host.docker.internal
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  # MCP server (backend/mcp/). Exposes the RAG lifecycle (create knowledge base
  # → poll status → search) as MCP tools for external agents. It is a thin HTTP
  # client of the `server` service and talks to nothing else — no
  # postgres/qdrant/rabbitmq dependency — so it only waits for `server` to
  # start. Agents connect over streamable-HTTP at http://mcp:8080/mcp (or
  # http://localhost:8080/mcp from the host).
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        EXTRAS: "mcp"
    working_dir: /app
    command: python -m backend.mcp.server
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env.docker
    environment:
      - SERVER_URL=http://server:8000
      - MCP_PORT=8080
    depends_on:
      server:
        condition: service_started

  ui:
    image: node:lts-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
    command: >
      sh -c "npm ci &&
            npm run dev -- --host"
    environment:
      - HOST=0.0.0.0
    # stdin_open: true
    # tty: true

volumes:
  qdrant_data:
  postgres_data:
  rabbitmq_data:
  ollama_data:
